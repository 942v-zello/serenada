name: Publish web packages

on:
  push:
    tags:
      - 'web-release-*'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Run validation and npm publish --dry-run instead of publishing'
        required: true
        type: boolean
        default: true

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: Publish @agatx web packages
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          scope: '@agatx'
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Use npm 11
        run: npm install -g npm@^11.5.1

      - name: Install dependencies
        run: npm ci

      - name: Check version parity
        run: node ../scripts/check-version-parity.mjs

      - name: Run tests
        run: npm test

      - name: Build app
        run: npm run build

      - name: Build publish artifacts
        run: |
          npm run build:publish --workspace @agatx/serenada-core
          npm run build:publish --workspace @agatx/serenada-react-ui

      - name: Verify package entrypoints
        run: |
          test -f packages/core/dist/index.js
          test -f packages/core/dist/index.d.ts
          test -f packages/react-ui/dist/index.js
          test -f packages/react-ui/dist/index.d.ts
          npm pack --dry-run --workspace @agatx/serenada-core
          npm pack --dry-run --workspace @agatx/serenada-react-ui

      - name: Publish packages
        env:
          NPM_PUBLISH_FLAGS: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run && '--dry-run' || '' }}
        run: |
          npm publish --workspace @agatx/serenada-core --access public ${NPM_PUBLISH_FLAGS}
          npm publish --workspace @agatx/serenada-react-ui --access public ${NPM_PUBLISH_FLAGS}
