name: SerenadaiOSSample
options:
  deploymentTarget:
    iOS: "16.0"
settings:
  base:
    SWIFT_VERSION: 5.9
    PRODUCT_BUNDLE_IDENTIFIER: app.serenada.sample.ios
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: ""
    TARGETED_DEVICE_FAMILY: "1,2"
packages:
  # Single manifest at the repo root exposes SerenadaCore and SerenadaCallUI.
  Serenada:
    path: ../..
targets:
  SerenadaiOSSample:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: SampleApp
      - path: Resources
        excludes:
          - Info.plist
    info:
      path: Resources/Info.plist
      properties:
        CFBundleShortVersionString: "0.1.0"
        CFBundleVersion: "1"
        CFBundleDisplayName: Serenada Sample
        UIApplicationSupportsIndirectInputEvents: YES
        UIBackgroundModes:
          - audio
        UILaunchScreen: {}
        NSCameraUsageDescription: Serenada Sample needs camera access for video calls.
        NSMicrophoneUsageDescription: Serenada Sample needs microphone access for audio calls.
        NSLocalNetworkUsageDescription: Serenada Sample may access local network interfaces for call connectivity checks.
    dependencies:
      - package: Serenada
        product: SerenadaCore
      - package: Serenada
        product: SerenadaCallUI
    settings:
      base:
        INFOPLIST_FILE: Resources/Info.plist
schemes:
  SerenadaiOSSample:
    build:
      targets:
        SerenadaiOSSample: all
