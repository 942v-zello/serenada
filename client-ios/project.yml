name: SerenadaiOS
options:
  deploymentTarget:
    iOS: "16.0"
settings:
  base:
    SWIFT_VERSION: 5.9
    PRODUCT_BUNDLE_IDENTIFIER: app.serenada.ios
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: ""
    TARGETED_DEVICE_FAMILY: "1,2"
    CURRENT_PROJECT_VERSION: 4
    MARKETING_VERSION: 0.4.2
    ENABLE_USER_SCRIPT_SANDBOXING: NO
packages:
  # Direct dependencies are pinned exact; the generated xcodeproj (and its
  # Package.resolved lockfile) is not tracked, so transitive versions float
  # at SwiftPM resolution time by design.
  Firebase:
    url: https://github.com/firebase/firebase-ios-sdk.git
    exactVersion: 11.15.0
  # Must match the exact: pin in the root Package.swift. Declared here because
  # app sources (JoinSnapshotFeature) import WebRTC directly.
  ZelloWebRTC:
    url: https://github.com/zelloptt/zello-ios-web-rtc
    exactVersion: 0.0.1
  # Single manifest at the repo root exposes SerenadaCore, SerenadaCallUI, and
  # SerenadaBroadcastExtensionSupport; external consumers use the same package
  # via this repo's Git URL.
  Serenada:
    path: ..
targets:
  SerenadaiOS:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: Sources
      - path: Shared
      - path: Resources
        excludes:
          - Info.plist
          - GoogleService-Info.plist
    info:
      path: Resources/Info.plist
      properties:
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        CFBundleDisplayName: Serenada
        UILaunchScreen: {}

        NSCameraUsageDescription: Serenada needs camera access for video calls.
        NSMicrophoneUsageDescription: Serenada needs microphone access for audio calls.
        NSLocalNetworkUsageDescription: Serenada may access local network interfaces for call connectivity checks.
        NSPhotoLibraryAddUsageDescription: Serenada saves call snapshots to your photo library when you tap the shutter button.
        UIApplicationSupportsIndirectInputEvents: YES
        UIBackgroundModes:
          - audio
          - voip
        LSApplicationQueriesSchemes:
          - https
    dependencies:
      - package: Firebase
        product: FirebaseMessaging
      - package: Serenada
        product: SerenadaCore
      - package: Serenada
        product: SerenadaBroadcastExtensionSupport
      - package: Serenada
        product: SerenadaCallUI
      - package: ZelloWebRTC
        product: WebRTC
      - target: SerenadaNotificationService
        embed: true
      - target: SerenadaBroadcast
        embed: true
    postBuildScripts:
      # GoogleService-Info.plist is gitignored (per-developer Firebase config), so it
      # must stay out of Copy Bundle Resources or the committed pbxproj flip-flops
      # depending on whether the generating machine has the file. Copy it into the
      # bundle here instead; absent file = push disabled, never a build failure.
      - name: Copy GoogleService-Info.plist (optional)
        basedOnDependencyAnalysis: false
        script: |
          SRC="${SRCROOT}/Resources/GoogleService-Info.plist"
          DST="${BUILT_PRODUCTS_DIR}/${UNLOCALIZED_RESOURCES_FOLDER_PATH}"
          if [ -f "$SRC" ]; then
            cp "$SRC" "$DST/"
            echo "Copied GoogleService-Info.plist into app bundle."
          else
            rm -f "$DST/GoogleService-Info.plist"
            echo "warning: GoogleService-Info.plist not found; Firebase Messaging will be unavailable in this build."
          fi
    settings:
      base:
        INFOPLIST_FILE: Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: Resources/SerenadaiOS.entitlements
  SerenadaNotificationService:
    type: app-extension
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: NotificationService
      - path: Shared
    info:
      path: NotificationService/Info.plist
      properties:
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        CFBundleDisplayName: Serenada Notification Service
        NSExtension:
          NSExtensionPointIdentifier: com.apple.usernotifications.service
          NSExtensionPrincipalClass: "$(PRODUCT_MODULE_NAME).NotificationService"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.serenada.ios.notificationservice
        INFOPLIST_FILE: NotificationService/Info.plist
        CODE_SIGN_ENTITLEMENTS: NotificationService/NotificationService.entitlements
  SerenadaBroadcast:
    type: app-extension
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: BroadcastUpload
        excludes:
          - Info.plist
    dependencies:
      - package: Serenada
        product: SerenadaBroadcastExtensionSupport
    info:
      path: BroadcastUpload/Info.plist
      properties:
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        CFBundleDisplayName: Serenada Broadcast
        SerenadaBroadcastAppGroupIdentifier: group.app.serenada.ios
        NSExtension:
          NSExtensionPointIdentifier: com.apple.broadcast-services-upload
          NSExtensionPrincipalClass: "$(PRODUCT_MODULE_NAME).ScreenShareSampleHandler"
          RPBroadcastProcessMode: RPBroadcastProcessModeSampleBuffer
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.serenada.ios.broadcast
        INFOPLIST_FILE: BroadcastUpload/Info.plist
        CODE_SIGN_ENTITLEMENTS: BroadcastUpload/BroadcastUpload.entitlements
        APPLICATION_EXTENSION_API_ONLY: YES
  SerenadaiOSTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: Tests
      - path: SerenadaCore/Tests/SerenadaCoreTests
      - path: SerenadaCallUI/Tests/SerenadaCallUITests
    dependencies:
      - target: SerenadaiOS
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: app.serenada.ios.tests
  SerenadaiOSUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: UITests
    dependencies:
      - target: SerenadaiOS
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: app.serenada.ios.uitests
schemes:
  SerenadaiOS:
    build:
      targets:
        SerenadaiOS: all
    test:
      targets:
        - SerenadaiOSTests
        - SerenadaiOSUITests
